<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Joanne &amp; Jin's Baby Shower</title>
    <meta
      name="description"
      content="RSVP for Joanne and Jin's baby shower."
    />
    <script>
      (function restoreGithubPagesPath() {
        const params = new URLSearchParams(window.location.search);
        const redirectedPath = params.get("p");

        if (!redirectedPath) {
          return;
        }

        const redirectedQuery = params.get("q");
        const nextPath = "/" + redirectedPath.replace(/^\/+/, "");
        const nextUrl =
          nextPath +
          (redirectedQuery ? "?" + redirectedQuery : "") +
          window.location.hash;

        window.history.replaceState(null, "", nextUrl);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
